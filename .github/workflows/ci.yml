name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aisp
          POSTGRES_PASSWORD: aisp_secret
          POSTGRES_DB: ai_social_publisher_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aisp -d ai_social_publisher_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://aisp:aisp_secret@localhost:5432/ai_social_publisher_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Tests
        run: go test -race -coverprofile=coverage.out ./...
      - name: Vulnerability scan
        run: |
          # v1.6.0+ is required to analyze go1.26 modules.
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...
      - name: Build
        run: go build ./cmd/server
      - name: Container build
        run: docker build -t ai-social-publisher:test .
